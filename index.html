<style>
:root {
  --sans: 'IBM Plex Sans Thai', sans-serif;
  --display: 'Sora', 'IBM Plex Sans Thai', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --bg: #EEF3EF; --surface: #FFFFFF; --surface2: #F5F9F6; --surface3: #E9F0EB;
  --border: #E3EAE5; --border-strong: #CFDAD3;
  --text-1: #15211A; --text-2: #55645B; --text-3: #93A399;
  --shadow-sm: 0 1px 2px rgba(20,40,28,.04), 0 1px 3px rgba(20,40,28,.05);
  --primary: #22A35B; --primary-dark: #14663A; --primary-soft: #E1F5E8; --primary-bright: #35B76D;
  --sidebar-w: 250px;
}
[data-theme="dark"] {
  --bg: #0A0F0B; --surface: #111A13; --surface2: #16201A; --surface3: #1F2C24;
  --border: rgba(255,255,255,.08); --border-strong: rgba(255,255,255,.15);
  --text-1: #ECF3EE; --text-2: #9DB0A4; --text-3: #647568;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
}
[data-cardstyle="flat"] { --shadow-sm: none; }
[data-density="compact"] { --sidebar-w: 230px; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text-1); font-size: 14px; -webkit-font-smoothing: antialiased; overflow: hidden; }
#root { height: 100dvh; }
button { font-family: inherit; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 9px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }

/* แถบชิปหมวดหมู่ (คลังสินค้า) — เลื่อนแนวนอนบรรทัดเดียว สกอลล์บาร์บาง */
.cat-chip-row { scrollbar-width: thin; }
.cat-chip-row::-webkit-scrollbar { height: 6px; }

/* ---------- layout ---------- */
.app-root { display: flex; height: 100dvh; overflow: hidden; }
.app-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.app-content { flex: 1; overflow: auto; padding: 22px 26px; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
[data-density="compact"] .app-content { padding: 16px 18px; }

/* ---------- sidebar ---------- */
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; transition: width .2s; }
.sidebar[data-mode="icons"] { width: 76px; align-items: center; }
.sidebar-brand { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--border); min-height: 73px; }
.sidebar[data-mode="icons"] .sidebar-brand { padding: 18px 0; justify-content: center; }
.brand-mark { height: 40px; width: auto; background: #fff; padding: 4px 6px; border-radius: 10px; box-shadow: var(--shadow-sm); flex-shrink: 0; }
.brand-name { font-family: var(--display); font-size: 15px; font-weight: 800; letter-spacing: .01em; color: var(--primary-dark); line-height: 1.1; white-space: nowrap; }
.brand-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

.sidebar-nav { padding: 14px 12px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar[data-mode="icons"] .sidebar-nav { width: 100%; align-items: center; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: 11px; border: none; background: none;
  cursor: pointer; font-size: 13.5px; font-weight: 600; color: var(--text-2); width: 100%; text-align: left; position: relative; transition: background .15s, color .15s; white-space: nowrap; }
.sidebar[data-mode="icons"] .nav-item { width: 48px; height: 48px; justify-content: center; padding: 0; }
.nav-item:hover { background: var(--surface2); color: var(--text-1); }
.nav-item.active { background: var(--primary-soft); color: var(--primary-dark); }
.nav-badge { margin-left: auto; background: #EF4444; color: #fff; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px;
  border-radius: 99px; display: grid; place-items: center; padding: 0 6px; }

.sidebar-foot { padding: 14px 12px; border-top: 1px solid var(--border); width: 100%; }
.role-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); padding: 0 4px 9px; }
.role-switch { display: flex; flex-direction: column; gap: 3px; }
.role-switch.icons { align-items: center; }
.role-btn { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 10px; border: none; background: none;
  cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--text-2); width: 100%; text-align: left; transition: all .15s; white-space: nowrap; }
.role-switch.icons .role-btn { width: 44px; height: 44px; justify-content: center; padding: 0; }
.role-btn:hover { background: var(--surface2); }
.role-btn.active { background: var(--primary); color: #fff; }

/* ---------- header ---------- */
.app-header { padding: 18px 26px 0; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
[data-density="compact"] .app-header { padding: 12px 18px 0; }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 23px; font-weight: 700; color: var(--text-1); letter-spacing: -.01em; white-space: nowrap; }
.page-sub { font-size: 13px; color: var(--text-2); margin-top: 3px; }
.page-sub strong { color: var(--text-1); font-weight: 700; }
.clear-chip { border: none; background: var(--surface3); color: var(--text-2); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; cursor: pointer; margin-left: 4px; font-family: inherit; }

.header-actions { display: flex; align-items: center; gap: 12px; }
.search-box { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 9px 13px; width: 280px; }
.search-box input { border: none; background: none; outline: none; font-size: 13.5px; color: var(--text-1); width: 100%; }
.search-box input::placeholder { color: var(--text-3); }
.btn-add { display: flex; align-items: center; gap: 7px; background: var(--primary); color: #fff; border: none; padding: 10px 18px;
  border-radius: 11px; font-size: 13.5px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(34,163,91,.25); transition: transform .12s, box-shadow .12s; white-space: nowrap; }
.btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(34,163,91,.35); }

.header-filters { display: flex; align-items: center; gap: 12px; padding: 14px 0; flex-wrap: wrap; }
.delay-toggle { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border-strong); color: var(--text-2);
  padding: 7px 14px; border-radius: 10px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.delay-toggle:hover { border-color: #EF4444; }
.delay-toggle.on { background: #EF4444; border-color: #EF4444; color: #fff; }
.ghost-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); color: var(--text-3);
  padding: 7px 13px; border-radius: 10px; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.ghost-btn:hover { background: var(--surface2); color: var(--text-2); }

@media (max-width: 1080px) {
  .search-box { width: 190px; }
}

/* On desktop: always show sidebar regardless of React inline-style transform */
@media (min-width: 861px) {
  .sidebar { transform: none !important; box-shadow: none !important; }
}

/* ---------- hamburger button (hidden on desktop) ---------- */
.hamburger {
  display: none; align-items: center; justify-content: center;
  width: 38px; height: 38px; border: none; background: var(--surface2);
  border-radius: 10px; cursor: pointer; flex-shrink: 0; color: var(--text-2);
  transition: background .15s;
}
.hamburger:hover { background: var(--surface3); }

/* close button inside sidebar (hidden on desktop) */
.sidebar-close-btn {
  display: none; align-items: center; justify-content: center;
  position: absolute; top: 16px; right: 14px;
  width: 28px; height: 28px; border: none; background: var(--surface2);
  border-radius: 8px; cursor: pointer; color: var(--text-2); flex-shrink: 0;
  transition: background .15s;
}
.sidebar-close-btn:hover { background: var(--surface3); }

/* sidebar overlay backdrop */
.sidebar-overlay {
  position: fixed; inset: 0; z-index: 70;
  background: rgba(0,0,0,.42);
  -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  animation: ovFadeIn .2s ease;
}
@keyframes ovFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 860px) {
  /* Sidebar: hidden by default, slides in with .sidebar--open */
  .sidebar {
    position: fixed; z-index: 80; height: 100%;
    transform: translateX(-100%);
    transition: transform .26s cubic-bezier(.4,0,.2,1);
    box-shadow: none;
  }
  .sidebar.sidebar--open {
    transform: translateX(0);
    box-shadow: 6px 0 36px rgba(0,0,0,.22);
  }

  /* Show mobile-only elements */
  .hamburger { display: flex; }
  .sidebar-close-btn { display: flex; }

  /* Sidebar needs relative positioning for close button */
  .sidebar { position: fixed; }
  .sidebar-brand { position: relative; padding-right: 50px; }

  /* Header: compact — เผื่อ safe-area ด้านบน (รอยบาก/แถบสถานะ iOS) */
  .app-header { padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 0; }
  [data-density="compact"] .app-header { padding: calc(10px + env(safe-area-inset-top, 0px)) 12px 0; }
  .header-top { gap: 8px; flex-wrap: nowrap; align-items: center; }
  .page-title { font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .page-sub { display: none; }
  .header-actions { gap: 8px; flex: 1; justify-content: flex-end; }
  .search-box { width: 0; min-width: 0; flex: 1; max-width: 200px; padding: 7px 10px; }
  .btn-add span { display: none; }
  .btn-add { padding: 10px 12px; min-width: 38px; border-radius: 10px; }
  .header-filters { padding: 8px 0; gap: 6px; }
  .ghost-btn { display: none; }
  .delay-toggle { padding: 5px 9px; font-size: 11.5px; }

  /* Content padding — เผื่อ safe-area ด้านล่าง (home indicator / แถบเบราว์เซอร์) */
  .app-content { padding: 12px 12px calc(16px + env(safe-area-inset-bottom, 0px)); }
  [data-density="compact"] .app-content { padding: 10px 10px calc(14px + env(safe-area-inset-bottom, 0px)); }

  /* Force 1-col grids — but NOT the 7-col calendar grid or the KPI grid */
  .app-content [style*="grid-template-columns"]:not([style*="repeat(7"]):not(.kpi-grid) { grid-template-columns: 1fr !important; }
  /* KPI cards: 2 columns on mobile (compact) */
  .app-content .kpi-grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
  /* Map: stack vertically */
  .app-content [style*="1.7fr 1fr"] { grid-template-columns: 1fr !important; }
}
